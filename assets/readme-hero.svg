<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VideoFrameExtractor</title>
  <desc id="desc">Windows local video shot detection and keyframe extraction workspace preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="blue" x1="224" y1="118" x2="940" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f6df6"/>
      <stop offset="1" stop-color="#16a3ff"/>
    </linearGradient>
    <filter id="shadow" x="70" y="60" width="1060" height="460" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <pattern id="grain" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M1 1h1v1H1zM11 4h1v1h-1zM6 14h1v1H6zM16 12h1v1h-1z" fill="#94a3b8" opacity="0.22"/>
    </pattern>
  </defs>

  <rect width="1200" height="560" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="560" rx="32" fill="url(#grain)" opacity="0.28"/>

  <g transform="translate(70 62)">
