    <text x="0" y="82" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="750">Shot Detection &amp; Keyframe Export</text>
    <text x="0" y="119" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="21">Local video workspace for shot review, keyframe selection, caching, and dataset export.</text>
  </g>

